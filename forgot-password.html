<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        // Intercepter immédiatement les redirections d'erreur d'authentification de Supabase
        (function() {
            const hash = window.location.hash || '';
            const search = window.location.search || '';
            if (hash.includes('error=') || search.includes('error=')) {
                const params = new URLSearchParams(
                    hash.startsWith('#') ? hash.substring(1) : (search.startsWith('?') ? search.substring(1) : hash)
                );
                if (params.has('error') || params.has('error_code')) {
                    const error = params.get('error') || '';
                    const code = params.get('error_code') || '';
                    const desc = params.get('error_description') || '';
                    window.location.replace(`auth-error.html?error=${encodeURIComponent(error)}&error_code=${encodeURIComponent(code)}&error_description=${encodeURIComponent(desc)}`);
                }
            }
        })();
    </script>
    <title>Mot de passe oublié - Vibe Trading</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Outfit:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Toast */
        .toast-container { position: fixed; top: 1.5rem; right: 1.5rem; z-index: 9999; display: flex; flex-direction: column; gap: 0.75rem; pointer-events: none; }
        .toast { pointer-events: auto; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(51, 65, 85, 0.6); color: white; padding: 1rem 1.25rem; border-radius: 1rem; box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.5); display: flex; align-items: center; gap: 0.875rem; transform: translateX(120%); opacity: 0; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); min-width: 300px; max-width: 400px; }
        .toast.show { transform: translateX(0); opacity: 1; }
        .toast-icon { display: flex; align-items: center; justify-content: center; width: 2.25rem; height: 2.25rem; border-radius: 0.6rem; flex-shrink: 0; }
        .toast-success .toast-icon { background: rgba(16, 185, 129, 0.15); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.25); }
        .toast-error .toast-icon { background: rgba(244, 63, 94, 0.15); color: #fb7185; border: 1px solid rgba(244, 63, 94, 0.25); }
        .toast-content { flex-grow: 1; }
        .toast-title { font-weight: 600; font-size: 0.95rem; margin-bottom: 0.125rem; }
        .toast-message { font-size: 0.875rem; color: #94a3b8; line-height: 1.4; }
        
        /* Inputs */
        .input-group { position: relative; }
        .input-field {
            width: 100%;
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid #334155;
            border-radius: 0.75rem;
            padding: 0.875rem 1rem 0.875rem 2.75rem;
            color: white;
            transition: all 0.3s ease;
        }
        .input-field:focus {
            outline: none;
            border-color: #0ea5e9;
            box-shadow: 0 0 0 2px rgba(14, 165, 233, 0.2);
            background: rgba(15, 23, 42, 0.8);
        }
        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            transition: color 0.3s ease;
            pointer-events: none;
        }
        .input-group:focus-within .input-icon { color: #38bdf8; }

        /* Buttons */
        .btn-primary {
            width: 100%;
            background: linear-gradient(to right, #0ea5e9, #2563eb);
            color: white;
            font-weight: 600;
            padding: 0.875rem;
            border-radius: 0.75rem;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(14, 165, 233, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-primary:hover:not(:disabled) {
            box-shadow: 0 0 30px rgba(14, 165, 233, 0.5);
            transform: translateY(-1px);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-50 min-h-screen flex items-center justify-center font-sans relative overflow-hidden">
    <!-- Background Effects -->
    <div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-1/2 -left-1/2 w-full h-full bg-gradient-radial from-blue-900/20 to-transparent blur-3xl"></div>
        <div class="absolute top-1/4 -right-1/4 w-[800px] h-[800px] bg-gradient-radial from-sky-800/10 to-transparent blur-3xl rounded-full"></div>
    </div>

    <!-- Main Card -->
    <div class="w-full max-w-[440px] z-10 p-4">
        <div class="glass-card rounded-[2rem] px-8 py-6 sm:px-10 sm:py-8 relative overflow-hidden ring-1 ring-white/10 shadow-2xl shadow-blue-900/20">
            <!-- Glare effect -->
            <div class="absolute top-0 left-0 w-full h-px bg-gradient-to-r from-transparent via-sky-400/30 to-transparent"></div>

            <div class="text-center mb-6">
                <div class="w-12 h-12 bg-gradient-to-br from-sky-400 to-blue-600 rounded-xl flex items-center justify-center mx-auto mb-3 shadow-[0_0_20px_rgba(56,189,248,0.3)] border border-sky-400/30">
                    <i data-lucide="key-round" class="text-white w-7 h-7"></i>
                </div>
                <h1 class="font-heading text-2xl font-bold mb-2 tracking-tight text-white">Mot de passe oublié</h1>
                <p class="text-slate-400 text-[13px] leading-relaxed">
                    Entrez votre adresse email pour recevoir un lien de réinitialisation sécurisé.
                </p>
            </div>

            <form id="forgotForm" class="space-y-4">
                <div class="input-group">
                    <i data-lucide="mail" class="w-5 h-5 input-icon"></i>
                    <input type="email" id="email" placeholder="Adresse Email" required class="input-field">
                </div>

                <button type="submit" id="submitBtn" class="btn-primary w-full mt-4 group">
                    <span id="btnText" class="flex items-center justify-center gap-2">
                        Envoyer le lien
                        <i data-lucide="arrow-right" class="w-5 h-5 group-hover:translate-x-1 transition-transform"></i>
                    </span>
                    <i data-lucide="loader-2" id="spinner" class="w-5 h-5 animate-spin hidden mx-auto"></i>
                </button>
            </form>

            <div class="mt-5 text-center text-sm text-slate-400">
                Vous vous souvenez de votre mot de passe ?
                <br>
                <a href="login.html" class="text-sky-400 font-semibold hover:text-sky-300 hover:underline underline-offset-4 transition-all relative inline-block group-hover:after:w-full mt-1">
                    Se Connecter
                </a>
            </div>
        </div>
    </div>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabaseClient.js"></script>

    <script>
        function showToast(title, message, type = 'success') {
            let container = document.getElementById('toast-container');
            if (!container) {
                container = document.createElement('div');
                container.id = 'toast-container';
                container.className = 'toast-container';
                document.body.appendChild(container);
            }

            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            const iconName = type === 'success' ? 'check-circle' : 'alert-circle';
            
            toast.innerHTML = `
                <div class="toast-icon">
                    <i data-lucide="${iconName}" class="w-5 h-5"></i>
                </div>
                <div class="toast-content">
                    <div class="toast-title">${title}</div>
                    <div class="toast-message">${message}</div>
                </div>
            `;
            
            container.appendChild(toast);
            lucide.createIcons({ root: toast });

            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    toast.classList.add('show');
                });
            });

            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => {
                    if (toast.parentNode) toast.parentNode.removeChild(toast);
                }, 500);
            }, 4000);
        }

        lucide.createIcons();

        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('spinner');
            const email = document.getElementById('email').value;

            submitBtn.disabled = true;
            btnText.classList.add('hidden');
            spinner.classList.remove('hidden');

            try {
                // Rediriger vers l'application de production Vercel
                const baseUrl = 'https://vibe-trading-phi.vercel.app';
                const { data, error } = await supabaseClient.auth.resetPasswordForEmail(email, {
                    redirectTo: `${baseUrl}/reset-password.html`,
                });

                if (error) throw error;
                
                showToast("Succès", "Un email de réinitialisation vous a été envoyé. Vérifiez votre boîte de réception.", "success");
                
                // Clear the form
                document.getElementById('email').value = '';
                
            } catch (error) {
                let msg = error.message;
                showToast("Erreur", msg, "error");
            } finally {
                submitBtn.disabled = false;
                btnText.classList.remove('hidden');
                spinner.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
