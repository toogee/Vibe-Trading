<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="#0a0f1e"/>
  <!-- Outer glow ring -->
  <rect width="64" height="64" rx="14" fill="none" stroke="url(#bg)" stroke-width="2" opacity="0.6"/>
  <!-- Chart line (trading icon) -->
  <polyline points="8,44 20,30 30,38 44,16 56,22"
            fill="none" stroke="url(#glow)" stroke-width="4"
            stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Dots -->
  <circle cx="8"  cy="44" r="3" fill="#38bdf8"/>
  <circle cx="20" cy="30" r="3" fill="#38bdf8"/>
  <circle cx="30" cy="38" r="3" fill="#6366f1"/>
  <circle cx="44" cy="16" r="3.5" fill="#38bdf8"/>
  <circle cx="56" cy="22" r="3" fill="#6366f1"/>
  <!-- VT text -->
  <text x="32" y="62" font-family="Arial,sans-serif" font-size="7" font-weight="bold"
        fill="#38bdf8" text-anchor="middle" opacity="0.7">VIBE TRADING</text>
</svg>
