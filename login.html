<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        // Intercepter immédiatement les redirections d'erreur d'authentification de Supabase
        (function() {
            const hash = window.location.hash || '';
            const search = window.location.search || '';
            if (hash.includes('error=') || search.includes('error=')) {
                const params = new URLSearchParams(
                    hash.startsWith('#') ? hash.substring(1) : (search.startsWith('?') ? search.substring(1) : hash)
                );
                if (params.has('error') || params.has('error_code')) {
                    const error = params.get('error') || '';
                    const code = params.get('error_code') || '';
                    const desc = params.get('error_description') || '';
                    window.location.replace(`auth-error.html?error=${encodeURIComponent(error)}&error_code=${encodeURIComponent(code)}&error_description=${encodeURIComponent(desc)}`);
                }
            }
        })();
    </script>
    <title>Vibe Trading — Connexion | Accédez à votre Espace Trading</title>
    <meta name="description" content="Connectez-vous à votre espace Vibe Trading pour suivre vos performances et contrôler votre bot GBPUSD en temps réel.">
    <meta name="robots" content="noindex, nofollow">
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="shortcut icon" href="/favicon.svg">
    <link rel="apple-touch-icon" href="/favicon.svg">
    <meta name="theme-color" content="#0ea5e9">
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #020617; /* slate-950 */
            color: #f8fafc;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Animated Blobs Background */
        .bg-blobs {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1;
            overflow: hidden;
        }
        .blob {
            position: absolute;
            filter: blur(100px);
            border-radius: 50%;
            animation: float 20s infinite alternate ease-in-out;
            opacity: 0.4;
        }
        .blob-1 { top: -10%; left: -10%; width: 600px; height: 600px; background: #0ea5e9; }
        .blob-2 { bottom: -20%; right: -10%; width: 700px; height: 700px; background: #2563eb; animation-delay: -5s; }
        .blob-3 { top: 40%; left: 50%; transform: translate(-50%, -50%); width: 500px; height: 500px; background: #3b82f6; animation-delay: -10s; opacity: 0.2; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(50px, 30px) scale(1.1); }
            100% { transform: translate(-30px, -50px) scale(0.9); }
        }

        /* Tiny candlestick glow effects in background */
        .candlestick {
            position: absolute;
            width: 4px;
            background: rgba(52, 211, 153, 0.2); /* green-400 */
            box-shadow: 0 0 10px rgba(52, 211, 153, 0.4);
            border-radius: 2px;
            animation: flicker 4s infinite alternate;
        }
        .candlestick.red {
            background: rgba(248, 113, 113, 0.2); /* red-400 */
            box-shadow: 0 0 10px rgba(248, 113, 113, 0.4);
        }
        @keyframes flicker {
            0% { opacity: 0.3; height: 20px; }
            50% { opacity: 0.8; height: 40px; }
            100% { opacity: 0.5; height: 30px; }
        }

        /* Glassmorphism Card */
        .glass-card {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(51, 65, 85, 0.5);
            box-shadow: 0 0 40px -10px rgba(14, 165, 233, 0.15);
            animation: cardFadeIn 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        @keyframes cardFadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Inputs */
        .input-group { position: relative; }
        .input-field {
            width: 100%;
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid #334155;
            border-radius: 0.75rem;
            padding: 0.875rem 1rem 0.875rem 2.75rem;
            color: white;
            transition: all 0.3s ease;
        }
        .input-field:focus {
            outline: none;
            border-color: #0ea5e9;
            box-shadow: 0 0 0 2px rgba(14, 165, 233, 0.2);
            background: rgba(15, 23, 42, 0.8);
        }
        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            transition: color 0.3s ease;
            pointer-events: none;
        }
        .input-group:focus-within .input-icon { color: #38bdf8; }

        /* Custom Checkbox */
        .custom-checkbox input:checked + div {
            background-color: #0ea5e9;
            border-color: #0ea5e9;
        }
        .custom-checkbox input:checked + div svg { transform: scale(1); }
        .custom-checkbox div svg { transform: scale(0); transition: transform 0.2s ease; }

        /* Buttons */
        .btn-primary {
            width: 100%;
            background: linear-gradient(to right, #0ea5e9, #2563eb);
            color: white;
            font-weight: 600;
            padding: 0.875rem;
            border-radius: 0.75rem;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(14, 165, 233, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(14, 165, 233, 0.5);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-social {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            width: 100%;
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid #334155;
            color: white;
            font-weight: 500;
            padding: 0.75rem;
            border-radius: 0.75rem;
            transition: all 0.3s ease;
        }
        .btn-social:hover { background: rgba(51, 65, 85, 0.8); }

        /* Toast */
        .toast-container { position: fixed; top: 1.5rem; right: 1.5rem; z-index: 9999; display: flex; flex-direction: column; gap: 0.75rem; pointer-events: none; }
        .toast { pointer-events: auto; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(51, 65, 85, 0.6); color: white; padding: 1rem 1.25rem; border-radius: 1rem; box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.5); display: flex; align-items: center; gap: 0.875rem; transform: translateX(120%); opacity: 0; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); min-width: 300px; max-width: 400px; }
        .toast.show { transform: translateX(0); opacity: 1; }
        .toast-icon { display: flex; align-items: center; justify-content: center; width: 2.25rem; height: 2.25rem; border-radius: 0.6rem; flex-shrink: 0; }
        .toast-success .toast-icon { background: rgba(16, 185, 129, 0.15); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.25); }
        .toast-error .toast-icon { background: rgba(244, 63, 94, 0.15); color: #fb7185; border: 1px solid rgba(244, 63, 94, 0.25); }
        .toast-content { flex-grow: 1; }
        .toast-title { font-weight: 600; font-size: 0.95rem; margin-bottom: 0.25rem; color: #f8fafc; }
        .toast-message { font-size: 0.85rem; color: #94a3b8; line-height: 1.4; }
    </style>
</head>
<body class="flex items-center justify-center p-4 sm:p-8">

    <!-- Background -->
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <!-- Trading particles -->
        <div class="candlestick" style="top: 20%; left: 15%; animation-delay: 0s;"></div>
        <div class="candlestick red" style="top: 60%; left: 80%; animation-delay: 1s;"></div>
        <div class="candlestick" style="top: 80%; left: 30%; animation-delay: 2s;"></div>
        <div class="candlestick red" style="top: 30%; left: 70%; animation-delay: 0.5s;"></div>
    </div>

    <!-- Main Card -->
    <div class="w-full max-w-[440px] z-10">
        <div class="glass-card rounded-[2rem] px-8 py-6 sm:px-10 sm:py-8 relative overflow-hidden ring-1 ring-white/10 shadow-2xl shadow-blue-900/20">
            <!-- Glare effect -->
            <div class="absolute top-0 left-0 w-full h-px bg-gradient-to-r from-transparent via-sky-400/30 to-transparent"></div>

            <!-- Header -->
            <div class="text-center mb-6">
                <div class="w-12 h-12 bg-gradient-to-br from-sky-400 to-blue-600 rounded-xl flex items-center justify-center mx-auto mb-3 shadow-[0_0_20px_rgba(56,189,248,0.3)] border border-sky-400/30">
                    <i data-lucide="log-in" class="text-white w-7 h-7"></i>
                </div>
                <h1 class="font-heading text-2xl font-bold mb-2 tracking-tight text-white">Connexion</h1>
                <p class="text-slate-400 text-[13px] leading-relaxed">
                    Accédez à votre dashboard de trading.
                </p>
            </div>

            <!-- Form -->
            <form id="loginForm" class="space-y-4">
                <!-- Email -->
                <div class="input-group">
                    <i data-lucide="mail" class="w-5 h-5 input-icon"></i>
                    <input type="email" id="email" placeholder="Adresse Email" required class="input-field">
                </div>

                <!-- Password -->
                <div class="space-y-2">
                    <div class="input-group">
                        <i data-lucide="lock" class="w-5 h-5 input-icon"></i>
                        <input type="password" id="password" placeholder="Mot de passe" required class="input-field pr-12">
                        <button type="button" id="togglePassword" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-sky-400 transition-colors">
                            <i data-lucide="eye" class="w-5 h-5" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>

                <!-- Remember & Forgot -->
                <div class="flex items-center justify-between">
                    <label class="custom-checkbox flex items-center gap-2 cursor-pointer group">
                        <div class="relative">
                            <input type="checkbox" id="remember" class="sr-only">
                            <div class="w-4 h-4 border-2 border-slate-600 rounded bg-slate-800/50 flex items-center justify-center transition-colors">
                                <i data-lucide="check" class="w-3 h-3 text-white"></i>
                            </div>
                        </div>
                        <span class="text-xs text-slate-400 group-hover:text-slate-300 transition-colors">Se souvenir</span>
                    </label>

                    <a href="forgot-password.html" class="text-xs text-sky-400 font-medium hover:text-sky-300 hover:underline underline-offset-4 transition-all">
                        Mot de passe oublié ?
                    </a>
                </div>

                <!-- Submit Button -->
                <button type="submit" id="submitBtn" class="btn-primary mt-4 group">
                    <span id="btnText" class="flex items-center gap-2">
                        Se Connecter
                        <i data-lucide="arrow-right" class="w-5 h-5 group-hover:translate-x-1 transition-transform"></i>
                    </span>
                    <i data-lucide="loader-2" id="spinner" class="w-5 h-5 animate-spin hidden"></i>
                </button>
            </form>



            <!-- Signup Link -->
            <div class="mt-5 text-center text-sm text-slate-400">
                Vous n'avez pas de compte ?
                <a href="signup.html" class="text-sky-400 font-semibold hover:text-sky-300 hover:underline underline-offset-4 transition-all relative inline-block group-hover:after:w-full">
                    Créer un Compte
                </a>
            </div>

            <!-- Link back to home -->
            <div class="mt-3 text-center">
                <a href="index.html" class="text-xs text-slate-500 hover:text-slate-300 transition-colors">
                    &larr; Retour à l'accueil
                </a>
            </div>

        </div>
    </div>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabaseClient.js"></script>

    <script>
        // Toast Notification System
        function showToast(title, message, type = 'success') {
            let container = document.getElementById('toast-container');
            if (!container) {
                container = document.createElement('div');
                container.id = 'toast-container';
                container.className = 'toast-container';
                document.body.appendChild(container);
            }

            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            const iconName = type === 'success' ? 'check-circle' : 'alert-circle';
            
            toast.innerHTML = `
                <div class="toast-icon">
                    <i data-lucide="${iconName}" class="w-5 h-5"></i>
                </div>
                <div class="toast-content">
                    <div class="toast-title">${title}</div>
                    <div class="toast-message">${message}</div>
                </div>
            `;
            
            container.appendChild(toast);
            lucide.createIcons({ root: toast });

            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    toast.classList.add('show');
                });
            });

            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => {
                    if (toast.parentNode) toast.parentNode.removeChild(toast);
                }, 500);
            }, 4000);
        }

        // Initialize Lucide Icons
        lucide.createIcons();

        // Elements
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const togglePassword = document.getElementById('togglePassword');
        const eyeIcon = document.getElementById('eyeIcon');
        
        const submitBtn = document.getElementById('submitBtn');
        const loginForm = document.getElementById('loginForm');

        // Toggle Password Visibility
        togglePassword.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            eyeIcon.setAttribute('data-lucide', type === 'password' ? 'eye' : 'eye-off');
            lucide.createIcons();
        });

        // Form Validation (Basic empty check before enabling full button)
        function checkFormValidity() {
            if (emailInput.value.length > 0 && passwordInput.value.length > 0) {
                submitBtn.removeAttribute('disabled');
            } else {
                submitBtn.setAttribute('disabled', 'true');
            }
        }

        emailInput.addEventListener('input', checkFormValidity);
        passwordInput.addEventListener('input', checkFormValidity);
        // Initial check
        checkFormValidity();

        // Submit Animation
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            submitBtn.disabled = true;
            document.getElementById('btnText').classList.add('hidden');
            document.getElementById('spinner').classList.remove('hidden');

            const email = emailInput.value;
            const password = passwordInput.value;

            try {
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) throw error;
                
                showToast("Succès", "Connexion réussie !", "success");
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);
            } catch (error) {
                let msg = error.message;
                if(msg.includes('Invalid login credentials')) msg = "Email ou mot de passe incorrect.";
                showToast("Erreur", msg, "error");
                submitBtn.disabled = false;
                document.getElementById('btnText').classList.remove('hidden');
                document.getElementById('spinner').classList.add('hidden');
            }
        });
    </script>
</body>
</html>
