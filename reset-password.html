<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nouveau mot de passe - Vibe Trading</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Outfit:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Toast */
        .toast-container { position: fixed; top: 1.5rem; right: 1.5rem; z-index: 9999; display: flex; flex-direction: column; gap: 0.75rem; pointer-events: none; }
        .toast { pointer-events: auto; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(51, 65, 85, 0.6); color: white; padding: 1rem 1.25rem; border-radius: 1rem; box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.5); display: flex; align-items: center; gap: 0.875rem; transform: translateX(120%); opacity: 0; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); min-width: 300px; max-width: 400px; }
        .toast.show { transform: translateX(0); opacity: 1; }
        .toast-icon { display: flex; align-items: center; justify-content: center; width: 2.25rem; height: 2.25rem; border-radius: 0.6rem; flex-shrink: 0; }
        .toast-success .toast-icon { background: rgba(16, 185, 129, 0.15); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.25); }
        .toast-error .toast-icon { background: rgba(244, 63, 94, 0.15); color: #fb7185; border: 1px solid rgba(244, 63, 94, 0.25); }
        .toast-content { flex-grow: 1; }
        .toast-title { font-weight: 600; font-size: 0.95rem; margin-bottom: 0.125rem; }
        .toast-message { font-size: 0.875rem; color: #94a3b8; line-height: 1.4; }
        
        /* Inputs */
        .input-group { position: relative; }
        .input-field {
            width: 100%;
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid #334155;
            border-radius: 0.75rem;
            padding: 0.875rem 1rem 0.875rem 2.75rem;
            color: white;
            transition: all 0.3s ease;
        }
        .input-field:focus {
            outline: none;
            border-color: #0ea5e9;
            box-shadow: 0 0 0 2px rgba(14, 165, 233, 0.2);
            background: rgba(15, 23, 42, 0.8);
        }
        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            transition: color 0.3s ease;
            pointer-events: none;
        }
        .input-group:focus-within .input-icon { color: #38bdf8; }

        /* Buttons */
        .btn-primary {
            width: 100%;
            background: linear-gradient(to right, #0ea5e9, #2563eb);
            color: white;
            font-weight: 600;
            padding: 0.875rem;
            border-radius: 0.75rem;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(14, 165, 233, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-primary:hover:not(:disabled) {
            box-shadow: 0 0 30px rgba(14, 165, 233, 0.5);
            transform: translateY(-1px);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-50 min-h-screen flex items-center justify-center font-sans relative overflow-hidden">
    <!-- Background Effects -->
    <div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-1/2 -left-1/2 w-full h-full bg-gradient-radial from-blue-900/20 to-transparent blur-3xl"></div>
        <div class="absolute top-1/4 -right-1/4 w-[800px] h-[800px] bg-gradient-radial from-sky-800/10 to-transparent blur-3xl rounded-full"></div>
    </div>

    <!-- Main Card -->
    <div class="w-full max-w-[440px] z-10 p-4">
        <div class="glass-card rounded-[2rem] px-8 py-6 sm:px-10 sm:py-8 relative overflow-hidden ring-1 ring-white/10 shadow-2xl shadow-blue-900/20">
            <!-- Glare effect -->
            <div class="absolute top-0 left-0 w-full h-px bg-gradient-to-r from-transparent via-sky-400/30 to-transparent"></div>

            <div class="text-center mb-6">
                <div class="w-12 h-12 bg-gradient-to-br from-sky-400 to-blue-600 rounded-xl flex items-center justify-center mx-auto mb-3 shadow-[0_0_20px_rgba(56,189,248,0.3)] border border-sky-400/30">
                    <i data-lucide="shield-alert" class="text-white w-7 h-7"></i>
                </div>
                <h1 class="font-heading text-2xl font-bold mb-2 tracking-tight text-white">Nouveau mot de passe</h1>
                <p class="text-slate-400 text-[13px] leading-relaxed">
                    Veuillez entrer votre nouveau mot de passe ci-dessous.
                </p>
            </div>

            <form id="resetForm" class="space-y-4">
                <!-- Password -->
                <div class="input-group">
                    <i data-lucide="lock" class="w-5 h-5 input-icon"></i>
                    <input type="password" id="password" placeholder="Nouveau mot de passe" required class="input-field pr-12">
                    <button type="button" id="togglePassword" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-sky-400 transition-colors">
                        <i data-lucide="eye" class="w-5 h-5" id="eyeIcon"></i>
                    </button>
                </div>

                <!-- Confirm Password -->
                <div class="input-group">
                    <i data-lucide="lock" class="w-5 h-5 input-icon"></i>
                    <input type="password" id="confirmPassword" placeholder="Confirmer le mot de passe" required class="input-field pr-12">
                    <button type="button" id="toggleConfirm" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-sky-400 transition-colors">
                        <i data-lucide="eye" class="w-5 h-5" id="eyeConfirmIcon"></i>
                    </button>
                </div>

                <button type="submit" id="submitBtn" class="btn-primary w-full mt-4 group">
                    <span id="btnText" class="flex items-center justify-center gap-2">
                        Réinitialiser le mot de passe
                        <i data-lucide="arrow-right" class="w-5 h-5 group-hover:translate-x-1 transition-transform"></i>
                    </span>
                    <i data-lucide="loader-2" id="spinner" class="w-5 h-5 animate-spin hidden mx-auto"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabaseClient.js"></script>

    <script>
        function showToast(title, message, type = 'success') {
            let container = document.getElementById('toast-container');
            if (!container) {
                container = document.createElement('div');
                container.id = 'toast-container';
                container.className = 'toast-container';
                document.body.appendChild(container);
            }

            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            const iconName = type === 'success' ? 'check-circle' : 'alert-circle';
            
            toast.innerHTML = `
                <div class="toast-icon">
                    <i data-lucide="${iconName}" class="w-5 h-5"></i>
                </div>
                <div class="toast-content">
                    <div class="toast-title">${title}</div>
                    <div class="toast-message">${message}</div>
                </div>
            `;
            
            container.appendChild(toast);
            lucide.createIcons({ root: toast });

            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    toast.classList.add('show');
                });
            });

            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => {
                    if (toast.parentNode) toast.parentNode.removeChild(toast);
                }, 500);
            }, 4000);
        }

        lucide.createIcons();

        // Toggle Password Logic
        const passwordInput = document.getElementById('password');
        const confirmInput = document.getElementById('confirmPassword');
        const togglePassword = document.getElementById('togglePassword');
        const toggleConfirm = document.getElementById('toggleConfirm');
        const eyeIcon = document.getElementById('eyeIcon');
        const eyeConfirmIcon = document.getElementById('eyeConfirmIcon');

        togglePassword.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            eyeIcon.setAttribute('data-lucide', type === 'password' ? 'eye' : 'eye-off');
            lucide.createIcons();
        });

        toggleConfirm.addEventListener('click', () => {
            const type = confirmInput.getAttribute('type') === 'password' ? 'text' : 'password';
            confirmInput.setAttribute('type', type);
            eyeConfirmIcon.setAttribute('data-lucide', type === 'password' ? 'eye' : 'eye-off');
            lucide.createIcons();
        });

        // Submit form
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newPassword = passwordInput.value;
            const confirmPass = confirmInput.value;

            if (newPassword !== confirmPass) {
                showToast("Erreur", "Les mots de passe ne correspondent pas.", "error");
                return;
            }

            if (newPassword.length < 8) {
                showToast("Erreur", "Le mot de passe doit contenir au moins 8 caractères.", "error");
                return;
            }

            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('spinner');

            submitBtn.disabled = true;
            btnText.classList.add('hidden');
            spinner.classList.remove('hidden');

            try {
                // Assuming Supabase automatically extracts the access_token from the URL hash
                const { data, error } = await supabaseClient.auth.updateUser({
                    password: newPassword
                });

                if (error) throw error;
                
                showToast("Succès", "Votre mot de passe a été mis à jour avec succès !", "success");
                
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
                
            } catch (error) {
                let msg = error.message;
                showToast("Erreur", msg, "error");
                
                submitBtn.disabled = false;
                btnText.classList.remove('hidden');
                spinner.classList.add('hidden');
            }
        });

        // Optional: Check if we actually have an access token in the URL Hash
        window.addEventListener('DOMContentLoaded', () => {
            const hash = window.location.hash;
            if (!hash || !hash.includes('access_token')) {
                // If there's no token, they shouldn't be on this page directly without clicking the email link
                // But we don't strictly redirect them away immediately in case the Supabase client handles it differently or session is already active.
                console.log("Aucun jeton d'accès trouvé dans l'URL.");
            }
        });
    </script>
</body>
</html>
